# Long-lived manual testing — same service + env shape as tests/docker-compose.readiness.yml, but:
#   - you run `up -d` (or scripts/kick-tires-up.sh), not `npm run test:readiness`
#   - no Node readiness harness, no §13 cooperative trigger checks
# After `docker compose down -v` or any fresh volume: Discord routes still reference session ids (e.g. `main`)
#   but SQLite is empty until you run `scripts/kick-tires-up.sh` (it execs bootstrap) or manually:
#   `compose exec -u shoggoth -w /app shoggoth node --import tsx/esm scripts/bootstrap-main-session.mjs`
#   Operator CLI on PATH: `compose exec -u shoggoth -w /app shoggoth shoggoth hitl list` (same for `-u agent`).
#
# Discord + model env: **only** `.env.shoggoth.local` (copy from `.env.shoggoth.example`, gitignored).
# Do not add `environment: - DISCORD_BOT_TOKEN` pass-through here: when the host omits those vars, some
# Compose versions drop them in the container and override values from `env_file`, so Discord stays unconfigured.
# Readiness overlay (`tests/docker-compose.readiness.yml`) still uses pass-through so the test harness can inject routes.
services:
  shoggoth:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.shoggoth.local
    # HITL: DM operator (no duplicate in-thread HITL reply — use `SHOGGOTH_DISCORD_HITL_REPLY_IN_SESSION=1` to re-enable).
    environment:
      SHOGGOTH_HITL_NOTIFY_DM_USER_ID: "347033761822801922"
      SHOGGOTH_DISCORD_HITL_REPLY_IN_SESSION: "0"
    volumes:
      - shoggoth-kick-secrets:/run/secrets

volumes:
  shoggoth-kick-secrets:
