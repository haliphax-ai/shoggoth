# Readiness / integration overlay — use with:
#   docker compose -f docker-compose.yml -f tests/docker-compose.readiness.yml up
#
# Prefer repo-root `.env.shoggoth.local` (copy `.env.shoggoth.example`) for Discord + model API vars — dedicated Shoggoth bot, not OpenClaw’s token.
# Optional: `tests/.env.readiness.local` (later entries override).
services:
  shoggoth:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Avoid `${VAR:-}` here — it overrides env_file with empty host values.
    env_file:
      - path: .env.shoggoth.local
        required: false
      - path: tests/.env.readiness.local
        required: false
    environment:
      - DISCORD_BOT_TOKEN
      - SHOGGOTH_DISCORD_ROUTES
      - OPENAI_BASE_URL
      - OPENAI_API_KEY
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_API_KEY
      - ANTHROPIC_VERSION
      - ANTHROPIC_AUTH
      - SHOGGOTH_MODEL
      - SHOGGOTH_OPERATOR_TOKEN
    volumes:
      - shoggoth-readiness-secrets:/run/secrets

volumes:
  shoggoth-readiness-secrets:
